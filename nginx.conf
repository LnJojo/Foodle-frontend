# Redirige tout le trafic HTTP vers HTTPS
server {
    listen 80;
    server_name playfoodle.fr www.playfoodle.fr;
    return 301 https://$host$request_uri;
}

# Serveur principal HTTPS
server {
    listen 443 ssl;
    server_name playfoodle.fr www.playfoodle.fr;

    # Certificats Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/playfoodle.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playfoodle.fr/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Proxy vers le backend Django
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Panneau d'administration Django
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
