server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip : réduit la taille des fichiers JS/CSS transférés
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # SPA fallback : toutes les URLs inconnues renvoient index.html
    # Sans ça, un refresh sur /dashboard renverrait une 404 Nginx
    location / {
        try_files $uri $uri/ /index.html;
    }
}
